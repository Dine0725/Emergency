<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AmbuLink – Driver App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:#07070f}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}

/* SHELL */
.shell{width:min(390px,100vw);height:min(844px,100vh);background:#0f0f1c;border-radius:clamp(0px,5vw,44px);border:1.5px solid #1e1e30;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.7)}

/* STATUS BAR */
.sbar{height:44px;min-height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:10}
.sbar-time{font-size:13px;font-weight:600;color:#fff}
.sbar-icons{font-size:12px;color:#fff;display:flex;gap:6px;align-items:center}

/* SCREEN */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative}
.screen::-webkit-scrollbar{display:none}

/* TYPE */
.t-big{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;line-height:1.15}
.t-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.t-sub{font-size:13px;color:#666;line-height:1.6;margin-top:5px}
.t-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#555}
.t-sect{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:#fff}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;padding:15px 20px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .12s,opacity .12s;-webkit-appearance:none;outline:none}
.btn:active{transform:scale(.97);opacity:.88}
.btn-red{background:linear-gradient(135deg,#c91f1f,#ef4444);color:#fff;box-shadow:0 6px 24px rgba(220,40,40,.35)}
.btn-ghost{background:rgba(255,255,255,.06);color:#ccc;border:1px solid rgba(255,255,255,.1)}
.btn-success{background:linear-gradient(135deg,#14803c,#22c55e);color:#fff;box-shadow:0 4px 18px rgba(34,197,94,.28)}
.btn-danger{background:linear-gradient(135deg,#7f1d1d,#ef4444);color:#fff}
.btn-outline-red{background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.22)}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:10px;width:auto}
.btn-link{background:none;color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;padding:4px}

/* INPUTS */
.inp{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);border-radius:13px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:#f0f0f0;outline:none;transition:border-color .15s,background .15s;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:rgba(220,40,40,.55);background:rgba(220,40,40,.04)}
.inp::placeholder{color:#383848}
.inp-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}

/* OTP */
.otp-row{display:flex;gap:8px;justify-content:center;margin:6px 0 18px}
.otp-box{width:50px;height:60px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:13px;font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#fff;text-align:center;outline:none;-webkit-appearance:none;transition:border-color .15s;line-height:1;padding:0;caret-color:#ef4444}
.otp-box:focus{border-color:#ef4444;background:rgba(220,40,40,.06)}
.otp-has{border-color:rgba(220,40,40,.4)}

/* CARD */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px}
.card-fire{background:linear-gradient(135deg,#180000,#140a0a);border:1px solid rgba(220,40,40,.22);border-radius:16px;padding:16px;position:relative;overflow:hidden}

/* BADGE */
.badge{display:inline-flex;align-items:center;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;letter-spacing:.03em}
.b-red{background:rgba(239,68,68,.14);color:#ef4444}
.b-amber{background:rgba(251,191,36,.12);color:#fbbf24}
.b-green{background:rgba(34,197,94,.12);color:#22c55e}
.b-blue{background:rgba(96,165,250,.12);color:#60a5fa}

/* TOGGLE */
.tog{width:52px;height:28px;border-radius:14px;background:rgba(255,255,255,.1);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;border:1px solid rgba(255,255,255,.07)}
.tog.on{background:rgba(34,197,94,.22);border-color:rgba(34,197,94,.38)}
.tog-k{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:4px;transition:left .26s;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.tog.on .tog-k{left:27px;background:#22c55e}

/* AVATAR */
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#c91f1f,#ef4444);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:15px;overflow:hidden;cursor:pointer;flex-shrink:0}
.av img,.av-lg img{width:100%;height:100%;object-fit:cover}
.av-lg{width:86px;height:86px;border-radius:50%;background:linear-gradient(135deg,#c91f1f,#ef4444);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:28px;overflow:hidden;cursor:pointer;flex-shrink:0;border:3px solid rgba(220,40,40,.38)}
.photo-ring{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .15s}
.photo-ring:hover{border-color:rgba(239,68,68,.45)}
.photo-ring img{width:100%;height:100%;object-fit:cover}

/* BOTTOM NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;height:78px;background:rgba(8,8,18,.97);border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:flex-start;padding:10px 0 0;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px 0}
.ni svg{width:22px;height:22px;fill:none;stroke-width:1.8}
.ni span{font-size:10px;font-weight:500}
.ni.on svg{stroke:#ef4444}.ni.on span{color:#ef4444}
.ni.off svg{stroke:#333}.ni.off span{color:#333}

/* TOAST */
.toast{position:absolute;top:52px;left:12px;right:12px;border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:500;animation:tIn .22s ease;pointer-events:none}
.toast-ok{background:rgba(7,20,7,.97);border:1px solid rgba(34,197,94,.28)}
.toast-err{background:rgba(20,7,7,.97);border:1px solid rgba(239,68,68,.28)}
@keyframes tIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
.toast-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* MODAL */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;z-index:400}
.sheet{background:#13131f;border-radius:22px 22px 0 0;padding:20px 22px 44px;width:100%;border-top:1px solid rgba(255,255,255,.09)}
.handle{width:34px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 18px}

/* MAP */
.map{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;height:185px;position:relative;overflow:hidden}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:26px 26px}
.map-rh{position:absolute;height:2px;background:rgba(255,255,255,.06);left:0;right:0;top:54%}
.map-rv{position:absolute;width:2px;background:rgba(255,255,255,.06);top:0;bottom:0;left:44%}
.map-pin{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;z-index:2}
.pin-r{width:11px;height:11px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.2);flex-shrink:0}
.pin-g{width:11px;height:11px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.2);flex-shrink:0}
.pin-lbl{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap}
.pl-r{background:rgba(0,0,0,.7);color:#ef4444}
.pl-g{background:rgba(0,0,0,.7);color:#22c55e}
.route{position:absolute;width:2px;background:linear-gradient(#ef4444,#22c55e);border-radius:2px;z-index:1}

/* PROG */
.prog{display:flex;align-items:flex-start;margin-bottom:18px}
.ps{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.pd{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.pd-done{background:#ef4444;color:#fff}
.pd-active{background:rgba(239,68,68,.18);border:2px solid #ef4444;color:#ef4444}
.pd-wait{background:rgba(255,255,255,.07);color:#333}
.pl-wrap{flex:1;padding-top:11px}
.pl{height:2px;width:100%;border-radius:1px}
.pl-done{background:#ef4444}
.pl-wait{background:rgba(255,255,255,.07)}
.prog-lbl{font-size:9px;color:#444;text-align:center;line-height:1.3;max-width:50px}

/* UTIL */
.p24{padding:24px}
.pb90{padding-bottom:90px}
.row{display:flex;align-items:center}
.row-b{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}
.g16{gap:16px}
.f1{flex:1;min-width:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mt6{margin-top:6px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.tc{text-align:center}

@keyframes spin{to{transform:rotate(360deg)}}
.spin-ico{animation:spin .7s linear infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.pulse{animation:pulse 1.1s infinite}

input[type=file]{display:none}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ══════════════════════════════════════════════════════
   LOCAL STORAGE KEYS
══════════════════════════════════════════════════════ */
const LS = {
  DRIVER  : 'ambulink_driver',
  PHOTO   : 'ambulink_photo',
  SESSION : 'ambulink_session',
  TRIPS   : 'ambulink_trips',
};

/* ══════════════════════════════════════════════════════
   PERSISTENT STORAGE HELPERS
══════════════════════════════════════════════════════ */
const DB = {
  save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
  },
  load(key, def = null) {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : def;
    } catch(e){ return def; }
  },
  remove(key) {
    try { localStorage.removeItem(key); } catch(e){}
  }
};

/* ══════════════════════════════════════════════════════
   MOCK REQUESTS / HISTORY DATA
══════════════════════════════════════════════════════ */
const REQS = [
  {id:1,patient:'Ramesh Kumar', age:68,emg:'Cardiac Arrest', addr:'14, Anna Nagar, Chennai', dist:'1.2 km',urg:'high'},
  {id:2,patient:'Priya Lakshmi',age:34,emg:'Road Accident',  addr:'KK Nagar Signal, Chennai',dist:'3.4 km',urg:'high'},
  {id:3,patient:'Arjun Mehta',  age:22,emg:'Fracture',       addr:'T Nagar Bus Stand',       dist:'5.1 km',urg:'med'},
];

/* ══════════════════════════════════════════════════════
   STATE  — auto-loads saved session on boot
══════════════════════════════════════════════════════ */
const savedDriver  = DB.load(LS.DRIVER);
const savedPhoto   = DB.load(LS.PHOTO);
const savedSession = DB.load(LS.SESSION);
const savedTrips   = DB.load(LS.TRIPS, []);

let S = {
  screen   : savedSession && savedDriver ? 'main' : 'splash',
  tab      : 'home',
  step     : 1,      // auth step
  flow     : 'reg',  // reg | login
  driver   : savedDriver  || {name:'',phone:'',ambulance:''},
  photo    : savedPhoto   || null,
  isOnline : true,
  activeTrip : null,
  tripStep : 0,
  loading  : false,
  toast    : null,
  _tTimer  : null,
  editModal: false,
  otpTimer : 0,
  _otpIv   : null,
  form     : {name:'',phone:'',ambulance:'',otp:['','','','','','']},
  trips    : savedTrips,
};

/* ══════════════════════════════════════════════════════
   CORE HELPERS
══════════════════════════════════════════════════════ */
function set(patch){ Object.assign(S, patch); render(); }

function toast(msg, err=false){
  if(S._tTimer) clearTimeout(S._tTimer);
  const t = setTimeout(()=>set({toast:null,_tTimer:null}), 3200);
  set({toast:{msg,err},_tTimer:t});
}

function startOtpTick(){
  clearInterval(S._otpIv);
  S.otpTimer = 30;
  const iv = setInterval(()=>{
    if(S.otpTimer <= 1){ clearInterval(iv); set({otpTimer:0,_otpIv:null}); }
    else{ S.otpTimer--; render(); }
  }, 1000);
  S._otpIv = iv;
}

function now(){ return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }

/* ══════════════════════════════════════════════════════
   AUTH ACTIONS
══════════════════════════════════════════════════════ */
function doSendOtp(){
  const ph = S.form.phone.trim();
  if(ph.length < 10){ toast('Enter a valid 10-digit number',true); return; }
  set({loading:true});
  // Simulate SMS delay
  setTimeout(()=>{
    startOtpTick();
    set({loading:false, step:2});
    toast('OTP sent to +91 '+ph+' (demo: use any 6 digits)');
  }, 900);
}

function doVerifyOtp(){
  const code = S.form.otp.join('');
  if(code.length < 6){ toast('Enter all 6 digits',true); return; }
  set({loading:true});
  setTimeout(()=>{
    set({loading:false});
    if(S.flow === 'login'){
      // Check if driver exists in localStorage
      const saved = DB.load(LS.DRIVER);
      if(saved && saved.phone === S.form.phone){
        DB.save(LS.SESSION, {loggedIn:true, at:Date.now()});
        set({driver:saved, photo:DB.load(LS.PHOTO), screen:'main'});
        toast('Welcome back, '+saved.name+'!');
      } else {
        // No saved profile — go to details
        set({step:3, flow:'reg'});
        toast('First time? Complete your profile.',true);
      }
    } else {
      set({step:3});
    }
  }, 900);
}

function doSaveDriver(){
  const {name,ambulance,phone} = S.form;
  if(!name.trim()){ toast('Enter your name',true); return; }
  if(!ambulance.trim()){ toast('Enter ambulance number',true); return; }
  set({loading:true});
  setTimeout(()=>{
    const driver = {
      name     : name.trim(),
      phone    : phone.trim(),
      ambulance: ambulance.trim().toUpperCase(),
    };
    DB.save(LS.DRIVER, driver);
    DB.save(LS.SESSION, {loggedIn:true, at:Date.now()});
    set({loading:false, driver, step:4});
    toast('Profile saved locally!');
  }, 700);
}

function doLogout(){
  DB.remove(LS.SESSION);
  set({
    screen:'splash', step:1,
    driver:{name:'',phone:'',ambulance:''},
    photo:null,
    form:{name:'',phone:'',ambulance:'',otp:['','','','','','']},
  });
}

/* ══════════════════════════════════════════════════════
   ICONS  (self-contained SVG paths)
══════════════════════════════════════════════════════ */
const P = {
  home    :'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z',
  trip    :'M12 2L4 7l8 5 8-5-8-5zM4 12l8 5 8-5M4 17l8 5 8-5',
  hist    :'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z',
  prof    :'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z',
  back    :'M19 12H5M12 19l-7-7 7-7',
  loc     :'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0zM12 10a1 1 0 100-2 1 1 0 000 2',
  check   :'M20 6L9 17l-5-5',
  x       :'M18 6L6 18M6 6l12 12',
  cam     :'M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z',
  cam2    :'M12 15a3 3 0 100-6 3 3 0 000 6z',
  img     :'M21 15l-5-5L5 21M3 3h18v18H3z',
  bell    :'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0',
  chev    :'M9 18l6-6-6-6',
  phone   :'M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.8a2 2 0 012-2.18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 9.09a16 16 0 006 6l1.27-.63a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z',
  shield  :'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',
  amb     :'M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v7a2 2 0 01-2 2h-2',
  star    :'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z',
  db      :'M12 2C6.48 2 2 4.02 2 6.5v11C2 19.98 6.48 22 12 22s10-2.02 10-4.5v-11C22 4.02 17.52 2 12 2z',
};
const ico=(n,sz=20,clr='currentColor',extra='')=>
  `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${clr}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0" ${extra}>${P[n]?`<path d="${P[n]}"/>`:''}${n==='cam'?`<path d="${P.cam2}"/>`:''}${n==='db'?`<ellipse cx="12" cy="5" rx="10" ry="3"/><path d="M2 5v6c0 1.66 4.48 3 10 3s10-1.34 10-3V5"/><path d="M2 11v6c0 1.66 4.48 3 10 3s10-1.34 10-3v-6"/>`:''}${n==='spin'?`<path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".2"/><path d="M21 12a9 9 0 00-9-9" stroke-linecap="round"/>`:''}${n==='amb'?`<circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/>`:''}${n==='loc'?'':''}${n==='trip'?`<path d="${P.trip}"/>`:''}${n==='img'?`<path d="M21 15l-5-5L5 21"/>`:''}</svg>`;

/* ══════════════════════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════════════════════ */
function render(){
  document.getElementById('root').innerHTML = shell();
  bind();
}

function shell(){
  return `
<div class="shell">
  <div class="sbar">
    <span class="sbar-time" id="clock">9:41</span>
    <span class="sbar-icons">●●● WiFi 🔋</span>
  </div>
  <div class="screen">
    ${page()}
    ${toastHTML()}
    ${modalHTML()}
  </div>
</div>`;
}

/* ── TOAST ────────────────────────────────────────── */
function toastHTML(){
  if(!S.toast) return '';
  const {msg,err} = S.toast;
  return `
  <div class="toast ${err?'toast-err':'toast-ok'}">
    <div class="toast-dot" style="background:${err?'rgba(239,68,68,.15)':'rgba(34,197,94,.15)'}">
      ${ico(err?'x':'check',13,err?'#ef4444':'#22c55e')}
    </div>
    <span style="font-size:13px;font-weight:500;color:${err?'#fecaca':'#d1fae5'};line-height:1.4">${msg}</span>
  </div>`;
}

/* ── EDIT MODAL ───────────────────────────────────── */
function modalHTML(){
  if(!S.editModal) return '';
  return `
  <div class="overlay" id="ov">
    <div class="sheet">
      <div class="handle"></div>
      <div class="t-title mb16">Edit Profile</div>
      <div class="inp-wrap">
        <label class="t-label">Full Name</label>
        <input class="inp" id="en" value="${S.driver.name}" placeholder="Your name">
      </div>
      <div class="inp-wrap">
        <label class="t-label">Ambulance Number</label>
        <input class="inp" id="ea" value="${S.driver.ambulance}" placeholder="TN01AB1234" style="text-transform:uppercase">
      </div>
      <button class="btn btn-red mt8" id="save-edit">Save Changes</button>
    </div>
  </div>`;
}

/* ── ROUTER ───────────────────────────────────────── */
function page(){
  if(S.screen==='splash')   return splash();
  if(S.screen==='register') return auth('reg');
  if(S.screen==='login')    return auth('login');
  if(S.screen==='main')     return main();
  return splash();
}

/* ════════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════════ */
function auth(flow){
  let body = '';

  if(S.step === 1){
    body = `
    <div class="t-title mb6">${flow==='login'?'Welcome Back':'Create Account'}</div>
    <div class="t-sub mb24">${flow==='login'?'Sign in with your registered number':'Join the emergency response network'}</div>
    <div class="inp-wrap">
      <label class="t-label">Mobile Number</label>
      <div class="row g8">
        <div style="width:64px;height:52px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#aaa;flex-shrink:0">+91</div>
        <input class="inp" id="ph" type="tel" inputmode="numeric" maxlength="10" placeholder="9876543210" value="${S.form.phone}">
      </div>
    </div>
    <div style="margin-top:auto">
      <button class="btn btn-red" id="send-otp">
        ${S.loading?`${ico('spin',17,'#fff')}<span>Sending...</span>`:'Send OTP via SMS'}
      </button>
    </div>`;

  } else if(S.step === 2){
    body = `
    <div class="t-title mb6">Enter OTP</div>
    <div class="t-sub mb20">6-digit code sent to +91 ${S.form.phone}</div>
    <div class="otp-row">
      ${[0,1,2,3,4,5].map(i=>`
        <input class="otp-box${S.form.otp[i]?' otp-has':''}"
          id="o${i}" maxlength="1" inputmode="numeric" type="tel"
          value="${S.form.otp[i]}"
          ${i===0?'autocomplete="one-time-code"':''}>`).join('')}
    </div>
    <div style="text-align:center;font-size:13px;color:#555;margin-bottom:20px">
      ${S.otpTimer>0
        ?`Resend in <span style="color:#ef4444;font-weight:600">${S.otpTimer}s</span>`
        :`<button class="btn-link" id="resend">↩ Resend OTP</button>`}
    </div>
    <div style="margin-top:auto">
      <button class="btn btn-red" id="verify-otp">
        ${S.loading?`${ico('spin',17,'#fff')}<span>Verifying...</span>`:'Verify & Continue →'}
      </button>
    </div>`;

  } else if(S.step === 3){
    body = `
    <div class="t-title mb6">Driver Details</div>
    <div class="t-sub mb22">Complete your profile to receive emergency requests</div>
    <div class="inp-wrap">
      <label class="t-label">Full Name</label>
      <input class="inp" id="nm" placeholder="e.g. Ravi Kumar" value="${S.form.name}">
    </div>
    <div class="inp-wrap">
      <label class="t-label">Ambulance Number</label>
      <input class="inp" id="ab" placeholder="e.g. TN01AB1234" value="${S.form.ambulance}" style="text-transform:uppercase">
    </div>
    <div style="margin-top:auto">
      <button class="btn btn-red" id="save-driver">
        ${S.loading?`${ico('spin',17,'#fff')}<span>Saving...</span>`:'Save & Continue →'}
      </button>
    </div>`;

  } else {
    // Step 4 — photo
    body = `
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;justify-content:center">
      <div style="width:68px;height:68px;border-radius:50%;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.35);display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        ${ico('check',34,'#22c55e')}
      </div>
      <div class="t-title mb6">You're Registered!</div>
      <div class="t-sub mb24">Welcome, ${S.driver.name}! Add a profile photo.</div>

      <input type="file" id="fp" accept="image/*">
      <div class="photo-ring mb8" id="pp" style="width:92px;height:92px">
        ${S.photo?`<img src="${S.photo}" alt="Profile">`:`<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="${P.prof}"/></svg>`}
      </div>
      <div class="t-sub mb18" style="font-size:12px">${S.photo?'Tap to change':'Tap circle to add photo'}</div>
      <div class="row g10 mb24">
        <button class="btn btn-ghost btn-sm" id="cam-btn">${ico('cam',14,'#ccc')} Camera</button>
        <button class="btn btn-ghost btn-sm" id="gal-btn">${ico('img',14,'#ccc')} Gallery</button>
      </div>
      <button class="btn btn-red" id="go-main">${S.photo?'Start Driving →':'Skip & Start Driving'}</button>
    </div>`;

  return `
  <div class="p24" style="display:flex;flex-direction:column;height:100%">
    <button class="row g8 mb22" id="back-btn" style="background:none;border:none;color:#555;font-family:inherit;font-size:13px;cursor:pointer;align-self:flex-start;padding:0">
      ${ico('back',16,'#555')} Back
    </button>
    ${body}
  </div>`;
}

/* ════════════════════════════════════════════════════

function main(){
  const tabs = {home:homeTab(), trip:tripTab(), hist:histTab(), prof:profTab()};
  return `
  <div style="height:100%;display:flex;flex-direction:column">
    <div style="flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:82px">

    ${nav()}
  </div>`;
}

function nav(){
  const ns=[
    {k:'home',icon:'home',lbl:'Home'},
    {k:'trip',icon:'trip',lbl:'Trip'},
    {k:'hist',icon:'hist',lbl:'History'},
    {k:'prof',icon:'prof',lbl:'Profile'},
  ];
  return `
  <div class="bnav">
    ${ns.map(n=>`
      <div class="ni ${S.tab===n.k?'on':'off'}" data-tab="${n.k}">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

          ${n.k==='trip'?`<path d="${P.trip}"/>`:''}
        </svg>
        <span>${n.lbl}</span>
      </div>`).join('')}
  </div>`;
}

/* ── TRIP TAB ─────────────────────────────────────── */
function tripTab(){

  return `

    <div class="row-b mb18">

  </div>`;
}

/* ════════════════════════════════════════════════════
   EVENT BINDING
════════════════════════════════════════════════════ */
function bind(){
  const $  = id => document.getElementById(id);
  const on = (id,ev,fn) => { const el=$(id); if(el) el.addEventListener(ev,fn); };
  const all = (sel,ev,fn) => document.querySelectorAll(sel).forEach(e=>e.addEventListener(ev,fn));

  /* ── SPLASH ── */
  on('go-reg',   'click', ()=>set({screen:'register',step:1,flow:'reg', form:{name:'',phone:'',ambulance:'',otp:['','','','','','']}}));
  on('go-login', 'click', ()=>set({screen:'login',   step:1,flow:'login',form:{name:'',phone:'',ambulance:'',otp:['','','','','','']}}));

  /* ── BACK ── */
  on('back-btn','click',()=>{
    if(S.step > 1 && S.step < 4) set({step: S.step-1});
    else set({screen:'splash',step:1});
  });

  /* ── PHONE INPUT ── */
  const ph = $('ph');
  if(ph) ph.addEventListener('input', e=>{ S.form.phone = e.target.value; });

  /* ── OTP SEND ── */
  on('send-otp','click', doSendOtp);
  on('resend',  'click', ()=>{ set({step:1}); });

  /* ── OTP BOXES ── */
  [0,1,2,3,4,5].forEach(i=>{
    const el=$('o'+i);
    if(!el) return;
    el.addEventListener('input', e=>{
      const v = e.target.value.replace(/\D/g,'').slice(0,1);
      e.target.value = v;
      const arr=[...S.form.otp]; arr[i]=v; S.form.otp=arr;
      e.target.className='otp-box'+(v?' otp-has':'');
      if(v && i<5) $('o'+(i+1))?.focus();
    });
    el.addEventListener('keydown', e=>{
      if(e.key==='Backspace' && !S.form.otp[i] && i>0) $('o'+(i-1))?.focus();
    });
    // paste support
    el.addEventListener('paste', e=>{
      e.preventDefault();
      const text = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
      const arr=[...S.form.otp];
      text.split('').slice(0,6-i).forEach((c,j)=>{ arr[i+j]=c; });
      S.form.otp=arr;
      render();
      $('o'+Math.min(i+text.length,5))?.focus();
    });
  });

  /* ── OTP VERIFY ── */
  on('verify-otp','click', doVerifyOtp);

  /* ── DRIVER DETAILS ── */
  const nm=$('nm'), ab=$('ab');
  if(nm) nm.addEventListener('input', e=>{ S.form.name=e.target.value; });
  if(ab) ab.addEventListener('input', e=>{ S.form.ambulance=e.target.value.toUpperCase(); e.target.value=e.target.value.toUpperCase(); });
  on('save-driver','click', doSaveDriver);

  /* ── PHOTO (step 4) ── */
  on('pp',     'click', ()=>$('fp')?.click());
  on('cam-btn','click', ()=>$('fp')?.click());
  on('gal-btn','click', ()=>$('fp')?.click());
  on('fp','change', e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      const url=ev.target.result;
      DB.save(LS.PHOTO, url);
      set({photo:url});
      toast('Profile photo saved!');
    };
    r.readAsDataURL(f);
  });
  on('go-main','click',()=>set({screen:'main',tab:'home'}));

  /* ── NAV ── */
  all('[data-tab]','click',e=>set({tab:e.currentTarget.dataset.tab}));

  /* ── HOME ── */
  on('tog',     'click', ()=>set({isOnline:!S.isOnline}));
  on('go-prof', 'click', ()=>set({tab:'prof'}));
  document.querySelectorAll('[data-accept]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=parseInt(btn.dataset.accept);
      const r=REQS.find(x=>x.id===id);
      set({activeTrip:r, tripStep:0, tab:'trip'});
      toast('Trip accepted!');
    });
  });

  /* ── TRIP ── */
  on('trip-adv','click',()=>{
    const s=S.tripStep;
    if(s<3){
      set({tripStep:s+1});
      toast(['Trip started!','Arrived at pickup!','Patient on board!'][s]);
    } else {
      const trip={
        patient:S.activeTrip.patient, emg:S.activeTrip.emg,
        done:true, km:(Math.random()*4+1).toFixed(1)+' km',
        time:now()
      };
      const trips=[...S.trips, trip];
      DB.save(LS.TRIPS, trips);
      set({activeTrip:null, tripStep:0, tab:'hist', trips});
      toast('Trip completed & saved!');
    }
  });

  /* ── PROFILE PHOTO ── */
  on('prof-photo','click',()=>$('fp2')?.click());
  on('prof-cam',  'click',()=>$('fp2')?.click());
  on('prof-gal',  'click',()=>$('fp2')?.click());
  on('fp2','change', e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      const url=ev.target.result;
      DB.save(LS.PHOTO, url);
      set({photo:url});
      toast('Photo updated & saved!');
    };
    r.readAsDataURL(f);
  });

  /* ── EDIT MODAL ── */
  all('#open-edit','click',()=>set({editModal:true}));
  on('ov','click',e=>{ if(e.target.id==='ov') set({editModal:false}); });
  on('save-edit','click',()=>{
    const n=$('en')?.value||S.driver.name;
    const a=$('ea')?.value||S.driver.ambulance;
    const driver={...S.driver, name:n, ambulance:a.toUpperCase()};
    DB.save(LS.DRIVER, driver);
    set({driver, editModal:false});
    toast('Profile updated & saved!');
  });

  /* ── LOGOUT ── */
  on('logout','click', doLogout);

  /* ── CLOCK ── */
  const clk=$('clock');
  if(clk){ const t=new Date(); clk.textContent=t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false}); }
}

/* ════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
